name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUBLIC_SUPABASE_URL: https://example.supabase.co
      PUBLIC_SUPABASE_ANON_KEY: sb_publishable_dummy
      SUPABASE_SERVICE_ROLE_KEY: sb_secret_dummy
      DATABASE_URL: postgres://dummy:dummy@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      # pnpm before setup-node so 'cache: pnpm' below can find it on PATH.
      # No `version` here — pnpm/action-setup reads `packageManager` from
      # package.json (pnpm@9.12.0). Specifying both leads to "Multiple
      # versions of pnpm specified" which fails in <5s (the bug we hit).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
