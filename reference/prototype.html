<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E30613">
<title>Hofmann Haus · Bauleiter-Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap">
<style>
:root{--red:#E30613;--red-deep:#B70510;--red-soft:#FDECEE;--ink:#0F0F10;--ink-2:#2A2925;--muted:#6B6660;--line:rgba(15,15,16,.08);--line-strong:rgba(15,15,16,.16);--bg:#F6F4F1;--paper:#FFFFFF;--paper-tint:#FAF8F4;--green:#2E7D32;--green-soft:#E8F4E9;--amber:#C97700;--amber-soft:#FDF1DA;--blue:#1F4163;--blue-soft:#E5EBF1;--grey:#B5B0AB;--grey-soft:#ECE9E4;--shadow-1:0 1px 2px rgba(15,15,16,.04),0 2px 6px rgba(15,15,16,.04);--shadow-2:0 4px 12px rgba(15,15,16,.08),0 12px 32px rgba(15,15,16,.06);--shadow-3:0 24px 48px rgba(15,15,16,.18);--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--display:'Archivo',system-ui,sans-serif;--body:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100dvh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
input:focus,textarea:focus,select:focus{outline:2px solid var(--red);outline-offset:1px}
#app{min-height:100dvh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#fff;padding:10px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar-logo{width:30px;height:30px;border:2.5px solid var(--red);border-radius:4px;position:relative;flex-shrink:0}
.topbar-logo::after{content:'';position:absolute;right:3px;bottom:3px;width:6px;height:6px;background:var(--red);border-radius:50%}
.topbar-text{flex:1;min-width:0}
.topbar-brand{font-family:var(--display);font-weight:800;font-size:13px;letter-spacing:.05em;text-transform:uppercase;line-height:1}
.topbar-brand .hl{color:var(--red)}
.topbar-project{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;display:flex;gap:6px;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-project .switch{cursor:pointer;color:rgba(255,255,255,.5);text-decoration:underline;text-underline-offset:2px;background:none;border:none;font:inherit;padding:0}
.topbar-project .switch:hover{color:#fff}
.topbar-actions{display:flex;gap:6px;position:relative}
.icon-btn{width:34px;height:34px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:rgba(255,255,255,.16)}
.icon-btn:active{transform:scale(.96)}
.icon-btn svg{width:18px;height:18px}
.tabbar{position:sticky;bottom:0;z-index:40;background:var(--paper);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:6px 6px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(15,15,16,.04)}
.tabbar-btn{padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);border-radius:8px;transition:all .15s}
.tabbar-btn svg{width:20px;height:20px}
.tabbar-btn span{font-size:10px;font-weight:600;font-family:var(--mono);letter-spacing:.02em;text-transform:uppercase}
.tabbar-btn.active,.tabbar-btn.active span{color:var(--red)}
main{flex:1;padding-bottom:80px}
.page{padding:14px;max-width:1100px;margin:0 auto}

.picker-screen{min-height:100dvh;background:var(--bg);padding:36px 18px 60px}
.picker-hero{text-align:center;margin-bottom:28px}
.picker-logo{width:64px;height:64px;border:4px solid var(--red);border-radius:6px;position:relative;margin:0 auto 16px}
.picker-logo::after{content:'';position:absolute;right:6px;bottom:6px;width:12px;height:12px;background:var(--red);border-radius:50%}
.picker-brand{font-family:var(--display);font-weight:900;font-size:18px;letter-spacing:.08em;text-transform:uppercase}
.picker-brand .hl{color:var(--red)}
.picker-tagline{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:8px}
.picker-section-title{font-family:var(--display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:24px auto 12px;padding:0 4px;max-width:540px}
.project-list{max-width:540px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.project-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;display:flex;align-items:center;gap:14px;text-align:left;width:100%;font-family:inherit;color:inherit;box-shadow:var(--shadow-1);transition:all .15s;cursor:pointer}
.project-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2);border-color:var(--ink)}
.project-card-icon{flex-shrink:0;width:46px;height:46px;border-radius:10px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center}
.project-card-icon svg{width:22px;height:22px}
.project-card-text{flex:1;min-width:0}
.project-card-name{font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1.2;margin-bottom:4px}
.project-card-meta{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:flex;flex-wrap:wrap;gap:4px 10px}
.project-card-meta b{color:var(--ink-2);font-weight:700}
.project-card-progress{flex-shrink:0;font-family:var(--display);font-weight:800;font-size:18px;color:var(--ink-2)}
.project-card-progress.done{color:var(--green)}
.picker-add{background:var(--paper);border:2px dashed var(--line-strong);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:12px;justify-content:center;width:100%;font-family:inherit;color:var(--muted);font-weight:600;font-size:14px;transition:all .15s}
.picker-add:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.picker-add svg{width:18px;height:18px}

.setup-screen{min-height:100dvh;background:var(--bg);padding:30px 18px 60px}
.setup-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-xl);padding:24px 22px;box-shadow:var(--shadow-1);max-width:540px;margin:0 auto;width:100%}
.setup-back{max-width:540px;margin:0 auto 16px;display:flex}
.setup-back button{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:none;border:none;padding:0}
.setup-back svg{width:12px;height:12px}
.setup-title{font-family:var(--display);font-weight:800;font-size:22px;line-height:1.15;letter-spacing:-.01em;margin:0 0 6px}
.setup-subtitle{color:var(--muted);font-size:14px;margin:0 0 22px}
.setup-template-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.setup-template{padding:14px;border:2px solid var(--line);background:var(--paper-tint);border-radius:var(--r-md);text-align:left;transition:all .15s}
.setup-template:hover{border-color:var(--red)}
.setup-template.active{border-color:var(--red);background:var(--red-soft)}
.setup-template-title{font-family:var(--display);font-weight:700;font-size:14px;margin-bottom:4px}
.setup-template-sub{font-size:11px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;line-height:1.4}
.field{margin-bottom:16px}
.field-label{display:block;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
.field-input{width:100%;padding:11px 14px;border:1px solid var(--line-strong);border-radius:var(--r-md);background:var(--paper-tint);transition:all .15s}
.field-input:focus{background:var(--paper);border-color:var(--red)}
.field-hint{font-size:12px;color:var(--muted);margin-top:4px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stepper{display:flex;align-items:center;gap:8px;background:var(--paper-tint);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:4px;width:fit-content}
.stepper-btn{width:34px;height:34px;background:var(--paper);border:1px solid var(--line);border-radius:8px;font-weight:700;font-size:17px;color:var(--ink);transition:all .12s}
.stepper-btn:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.stepper-btn:active{transform:scale(.94)}
.stepper-btn:disabled{opacity:.3;cursor:not-allowed}
.stepper-value{min-width:50px;text-align:center;font-family:var(--display);font-weight:800;font-size:20px;line-height:1}
.houses-config{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.house-config{background:var(--paper-tint);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;display:flex;align-items:center;gap:12px}
.house-config-label{font-family:var(--mono);font-size:12px;font-weight:600;text-transform:uppercase;color:var(--ink);flex:1}
.house-config .stepper{padding:2px}
.house-config .stepper-btn{width:28px;height:28px;font-size:15px}
.house-config .stepper-value{font-size:15px;min-width:32px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border:1px solid transparent;border-radius:var(--r-md);font-family:var(--body);font-weight:600;font-size:14px;transition:all .15s;text-decoration:none}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--red);color:#fff;box-shadow:0 2px 4px rgba(227,6,19,.2)}
.btn-primary:hover{background:var(--red-deep)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-strong)}
.btn-ghost:hover{background:var(--paper-tint);border-color:var(--ink)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red-soft)}
.btn-block{width:100%;padding:13px 20px;font-size:15px}
.btn-sm{padding:7px 12px;font-size:13px}

.hero{background:var(--ink);color:#fff;border-radius:var(--r-xl);padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(227,6,19,.18) 0%,transparent 65%);pointer-events:none}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.55);margin-bottom:6px}
.hero-title{font-family:var(--display);font-weight:800;font-size:22px;line-height:1.15;margin:0 0 16px;letter-spacing:-.01em}
.hero-progress-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.progress-ring{flex-shrink:0;width:68px;height:68px;position:relative}
.progress-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.progress-ring circle{fill:none;stroke-width:7}
.progress-ring .ring-bg{stroke:rgba(255,255,255,.12)}
.progress-ring .ring-fg{stroke:var(--red);transition:stroke-dashoffset .6s ease;stroke-linecap:round}
.progress-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:17px}
.hero-stats{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.hero-stat-num{font-family:var(--display);font-weight:800;font-size:20px;line-height:1;margin-bottom:3px}
.hero-stat-lbl{font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.6)}
.hero-meta{display:flex;flex-wrap:wrap;gap:8px 14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)}
.hero-meta-item{font-family:var(--mono);font-size:11px;font-weight:500;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.04em}
.hero-meta-item b{color:#fff;font-weight:700}

.section-title{font-family:var(--display);font-weight:700;font-size:17px;margin:22px 0 10px;letter-spacing:-.005em;display:flex;align-items:baseline;justify-content:space-between}
.section-title .count{font-family:var(--mono);font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.scope-group{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-1);width:100%;text-align:left;font-family:inherit;color:inherit;cursor:pointer}
.scope-group:hover{border-color:var(--line-strong)}
.scope-group-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.scope-icon{width:26px;height:26px;border-radius:8px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center}
.scope-icon svg{width:15px;height:15px}
.scope-name{font-family:var(--display);font-weight:700;font-size:14px;flex:1}
.scope-progress-text{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted)}
.progress-bar{height:6px;background:var(--grey-soft);border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--red) 0%,var(--red-deep) 100%);border-radius:3px;transition:width .5s ease}
.progress-bar-fill.green{background:var(--green)}
.activity-feed{display:flex;flex-direction:column;gap:6px}
.activity-item{display:flex;gap:11px;padding:10px 12px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);transition:all .12s;cursor:pointer;text-align:left;width:100%;font-family:inherit;color:inherit}
.activity-item:hover{border-color:var(--line-strong);transform:translateX(2px)}
.activity-icon{width:30px;height:30px;border-radius:8px;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.activity-icon svg{width:15px;height:15px}
.activity-icon.photo{background:var(--red-soft);color:var(--red)}
.activity-text{flex:1;min-width:0}
.activity-line1{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-line2{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

.filter-bar{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-pill{padding:7px 13px;background:var(--paper);border:1px solid var(--line);border-radius:999px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;transition:all .12s}
.filter-pill:hover{border-color:var(--ink);color:var(--ink)}
.filter-pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filter-pill .badge{display:inline-block;margin-left:6px;padding:1px 6px;background:rgba(255,255,255,.18);border-radius:8px;font-size:10px}
.filter-pill:not(.active) .badge{background:var(--grey-soft);color:var(--ink)}
.checklist-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:640px){.checklist-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.checklist-grid{grid-template-columns:repeat(3,1fr)}}
.checklist-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px;text-align:left;transition:all .15s;box-shadow:var(--shadow-1);display:flex;flex-direction:column;width:100%;cursor:pointer;font-family:inherit;color:inherit}
.checklist-card:hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:var(--shadow-2)}
.checklist-card.complete{background:var(--paper-tint)}
.checklist-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.checklist-num{flex-shrink:0;width:30px;height:30px;background:var(--ink);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;font-size:13px}
.checklist-card.complete .checklist-num{background:var(--green)}
.checklist-title{font-family:var(--display);font-weight:700;font-size:15px;line-height:1.2;flex:1;margin:4px 0}
.checklist-meta{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.scope-tag{padding:2px 7px;background:var(--grey-soft);border-radius:4px;color:var(--ink-2)}
.scope-tag.project{background:var(--blue-soft);color:var(--blue)}
.scope-tag.house{background:#F0E5DC;color:#6B4A2C}
.scope-tag.apartment{background:var(--red-soft);color:var(--red-deep)}
.checklist-card-foot{display:flex;align-items:center;gap:10px;margin-top:auto;padding-top:10px}
.checklist-card-foot .progress-bar{flex:1}
.checklist-progress-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink)}
.checklist-photo-count{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase}
.checklist-photo-count svg{width:12px;height:12px}

.detail-header{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-1)}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:0;margin-bottom:8px}
.back-link:hover{color:var(--ink)}
.back-link svg{width:12px;height:12px}
.detail-num-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.detail-title{font-family:var(--display);font-weight:800;font-size:22px;line-height:1.1;letter-spacing:-.015em;margin:6px 0 12px}
.detail-progress{display:flex;align-items:center;gap:10px}
.detail-progress .progress-bar{flex:1}
.detail-progress-num{font-family:var(--mono);font-size:12px;font-weight:700}
.filter-houses{display:flex;gap:6px;overflow-x:auto;margin:4px 0 14px;padding:2px 0}
.filter-houses::-webkit-scrollbar{display:none}
.house-chip{padding:6px 12px;background:var(--paper);border:1px solid var(--line);border-radius:999px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;transition:all .12s}
.house-chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.section-block{margin-bottom:16px}
.section-heading{font-family:var(--display);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 8px;padding:0 4px}
.item-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:8px;transition:all .15s;box-shadow:var(--shadow-1)}
.item-card:hover{border-color:var(--line-strong)}
.item-card-text{font-size:14px;line-height:1.45;color:var(--ink);margin-bottom:10px}
.item-card-status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.status-summary{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink)}
.status-summary .dot{width:8px;height:8px;border-radius:50%;background:var(--grey)}
.status-summary.done .dot{background:var(--green)}
.status-summary.partial .dot{background:var(--amber)}
.status-summary-meta{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-left:auto}
.item-house-group{margin-top:8px}
.item-house-group+.item-house-group{margin-top:10px}
.item-house-label{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.pills-grid{display:flex;flex-wrap:wrap;gap:6px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:var(--grey-soft);border:1px solid transparent;border-radius:999px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink-2);transition:all .15s;line-height:1;min-height:30px}
.pill:hover{transform:translateY(-1px);box-shadow:var(--shadow-1)}
.pill:active{transform:scale(.95)}
.pill.done{background:var(--green-soft);color:var(--green);border-color:rgba(46,125,50,.2)}
.pill.partial{background:var(--amber-soft);color:var(--amber);border-color:rgba(201,119,0,.18)}
.pill.project{padding:8px 14px;font-size:13px}
.pill .pill-dot{width:7px;height:7px;border-radius:50%;background:var(--grey)}
.pill.done .pill-dot{background:var(--green)}
.pill.partial .pill-dot{background:var(--amber)}
.pill .pill-cam{display:inline-flex;align-items:center;gap:2px;font-size:10px;opacity:.85}
.pill .pill-cam svg{width:11px;height:11px}

.scrim{position:fixed;inset:0;z-index:100;background:rgba(15,15,16,.55);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--paper);border-top-left-radius:22px;border-top-right-radius:22px;box-shadow:var(--shadow-3);transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:92dvh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--line-strong);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-head{padding:12px 18px 6px;display:flex;align-items:flex-start;gap:12px;flex-shrink:0}
.sheet-head-text{flex:1;min-width:0}
.sheet-eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;line-height:1.3}
.sheet-title{font-family:var(--display);font-weight:700;font-size:18px;line-height:1.2;margin:0}
.sheet-close{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:var(--grey-soft);display:flex;align-items:center;justify-content:center;color:var(--ink)}
.sheet-close:hover{background:var(--line-strong)}
.sheet-close svg{width:18px;height:18px}
.sheet-body{padding:6px 18px 18px;overflow-y:auto;flex:1}
.sheet-item-text{font-size:14px;line-height:1.5;color:var(--ink-2);background:var(--paper-tint);padding:11px 13px;border-radius:var(--r-md);border-left:3px solid var(--red);margin-bottom:16px}
.sheet-status-toggle{display:flex;align-items:center;gap:12px;padding:13px;background:var(--paper-tint);border:2px solid var(--line);border-radius:var(--r-md);margin-bottom:14px;cursor:pointer;transition:all .15s;user-select:none}
.sheet-status-toggle.checked{background:var(--green-soft);border-color:var(--green)}
.check-box{width:24px;height:24px;border:2px solid var(--line-strong);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--paper)}
.sheet-status-toggle.checked .check-box{background:var(--green);border-color:var(--green)}
.check-box svg{width:14px;height:14px;color:#fff;opacity:0;transition:opacity .15s}
.sheet-status-toggle.checked .check-box svg{opacity:1}
.sheet-status-text{font-family:var(--display);font-weight:700;font-size:15px}
.sheet-status-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
.photos-section{margin-bottom:14px}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.photo-tile{aspect-ratio:1;border-radius:var(--r-md);overflow:hidden;background:var(--grey-soft);border:1px solid var(--line);position:relative;cursor:pointer}
.photo-tile img{width:100%;height:100%;object-fit:cover;display:block}
.photo-tile-del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(15,15,16,.7);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.photo-tile:hover .photo-tile-del,.photo-tile:active .photo-tile-del{opacity:1}
.photo-tile-del svg{width:12px;height:12px}
.photo-add-tile{aspect-ratio:1;border:2px dashed var(--line-strong);border-radius:var(--r-md);background:var(--paper-tint);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--muted);transition:all .15s}
.photo-add-tile:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.photo-add-tile svg{width:22px;height:22px}
.photo-add-tile span{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.sheet-foot{padding:12px 18px calc(18px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:var(--paper);flex-shrink:0}

.viewer{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center}
.viewer.open{display:flex}
.viewer img{max-width:96vw;max-height:92vh;object-fit:contain}
.viewer-close{position:absolute;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,.12);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
.menu{position:absolute;top:100%;right:0;margin-top:6px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-2);min-width:230px;overflow:hidden;z-index:60;display:none}
.menu.open{display:block}
.menu-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;text-align:left;font-size:14px;color:var(--ink);border-bottom:1px solid var(--line)}
.menu-item:last-child{border-bottom:none}
.menu-item:hover{background:var(--paper-tint)}
.menu-item.danger{color:var(--red)}
.menu-item svg{width:16px;height:16px;flex-shrink:0}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .25s;box-shadow:var(--shadow-2);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.dialog{position:fixed;inset:0;z-index:250;background:rgba(15,15,16,.55);display:none;align-items:center;justify-content:center;padding:18px}
.dialog.open{display:flex}
.dialog-panel{background:var(--paper);border-radius:var(--r-lg);padding:20px;max-width:420px;width:100%;box-shadow:var(--shadow-3)}
.dialog-title{font-family:var(--display);font-weight:700;font-size:17px;margin:0 0 8px}
.dialog-text{color:var(--muted);margin:0 0 18px;font-size:14px}
.dialog-actions{display:flex;gap:8px;justify-content:flex-end}
.empty{text-align:center;padding:36px 18px;color:var(--muted)}
.empty-emoji{font-size:32px;margin-bottom:8px}
.empty-text{font-size:14px}

/* GANTT */
.gantt-page{padding:0;max-width:none;margin:0}
.gantt-toolbar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap;position:sticky;top:51px;z-index:30}
.gantt-toolbar-group{display:flex;gap:4px;align-items:center;background:var(--paper-tint);padding:3px;border-radius:8px;border:1px solid var(--line)}
.gantt-zoom-btn{padding:5px 10px;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-radius:5px;transition:all .12s}
.gantt-zoom-btn:hover{color:var(--ink)}
.gantt-zoom-btn.active{background:var(--ink);color:#fff}
.gantt-toolbar .btn{padding:6px 12px;font-size:12px}
.gantt-toolbar-spacer{flex:1}
.gantt-info{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.gantt-info b{color:var(--ink-2)}
.gantt-wrap{display:flex;background:var(--paper);height:calc(100dvh - 51px - 49px - 80px);min-height:480px;overflow:hidden;border-top:1px solid var(--line)}
.gantt-list{flex-shrink:0;width:300px;border-right:1px solid var(--line-strong);background:var(--paper);overflow-y:auto;overflow-x:hidden;scrollbar-width:thin}
@media(max-width:640px){.gantt-list{width:200px}}
.gantt-list-head{position:sticky;top:0;z-index:5;background:var(--paper-tint);border-bottom:1px solid var(--line);height:60px;display:flex;align-items:flex-end;padding:0 12px 8px;font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.gantt-row-list{height:32px;display:flex;align-items:center;padding:0 8px 0 0;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;transition:background .12s;position:relative}
.gantt-row-list:hover{background:var(--paper-tint)}
.gantt-row-list.depth-0{font-weight:800;font-family:var(--display);font-size:13px;background:var(--paper-tint)}
.gantt-row-list.depth-0:hover{background:var(--grey-soft)}
.gantt-row-list.depth-1{font-weight:700}
.gantt-list-toggle{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);transition:transform .15s}
.gantt-list-toggle.expanded{transform:rotate(90deg)}
.gantt-list-toggle.empty{visibility:hidden}
.gantt-list-toggle svg{width:10px;height:10px}
.gantt-list-num{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;flex-shrink:0;min-width:38px;letter-spacing:-.02em}
.gantt-list-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-list.depth-1 .gantt-list-name{padding-left:6px}
.gantt-row-list.depth-2 .gantt-list-name{padding-left:14px;font-size:12.5px;color:var(--ink-2)}
.gantt-timeline-wrap{flex:1;overflow:auto;position:relative;background:var(--paper);scrollbar-width:thin}
.gantt-timeline{position:relative}
.gantt-axis{position:sticky;top:0;z-index:5;background:var(--paper-tint);border-bottom:1px solid var(--line-strong);height:60px}
.gantt-axis-month{position:absolute;top:0;height:30px;border-right:1px solid var(--line);display:flex;align-items:center;justify-content:flex-start;font-family:var(--display);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);padding:0 8px;white-space:nowrap;overflow:hidden}
.gantt-axis-week,.gantt-axis-day{position:absolute;height:30px;top:30px;border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:-.02em}
.gantt-axis-week.today,.gantt-axis-day.today{color:var(--red);font-weight:700}
.gantt-grid{position:absolute;top:60px;left:0;right:0;bottom:0;pointer-events:none}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:1px;background:var(--line)}
.gantt-grid-line.month{background:var(--line-strong)}
.gantt-grid-weekend{position:absolute;top:0;bottom:0;background:rgba(15,15,16,.025);pointer-events:none}
.gantt-today-line{position:absolute;top:30px;bottom:0;width:2px;background:var(--red);z-index:8;pointer-events:none;box-shadow:0 0 0 1px rgba(227,6,19,.2)}
.gantt-today-label{position:absolute;left:-14px;top:0;background:var(--red);color:#fff;font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.gantt-rows{position:relative}
.gantt-row{position:relative;height:32px;border-bottom:1px solid var(--line)}
.gantt-row.depth-0{background:var(--paper-tint)}
.gantt-row:hover{background:rgba(227,6,19,.03)}
.gantt-bar{position:absolute;top:6px;height:20px;background:var(--blue);border-radius:4px;cursor:pointer;display:flex;align-items:center;padding:0 6px;font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.1);transition:all .12s;min-width:8px}
.gantt-bar:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.18);z-index:6}
.gantt-bar.summary{height:8px;top:12px;border-radius:2px;background:linear-gradient(180deg,var(--ink) 0%,var(--ink-2) 100%);font-size:0}
.gantt-bar-label-outside{position:absolute;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--ink-2);white-space:nowrap;pointer-events:none;top:50%;transform:translateY(-50%)}
.gantt-deps-svg{position:absolute;top:60px;left:0;pointer-events:none;z-index:7}
.gantt-deps-svg path{stroke:var(--ink-2);stroke-width:1.2;fill:none;opacity:.5}
.task-color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.task-color-swatch{width:32px;height:32px;border-radius:8px;border:2px solid var(--paper);box-shadow:0 0 0 1px var(--line-strong);cursor:pointer;transition:transform .12s}
.task-color-swatch.active{box-shadow:0 0 0 2px var(--ink)}
.task-color-swatch:hover{transform:scale(1.1)}
.gantt-empty{padding:60px 20px;text-align:center}
.gantt-empty .empty-emoji{font-size:38px}
.gantt-empty-actions{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.dep-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.dep-pill{padding:5px 9px;background:var(--paper-tint);border:1px solid var(--line);border-radius:999px;font-family:var(--mono);font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.dep-pill .x{cursor:pointer;color:var(--muted)}
.dep-pill .x:hover{color:var(--red)}
.task-editor select.field-input{padding-right:30px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B6660' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;appearance:none;-webkit-appearance:none}

// IndexedDB
let dbPromise=null;
function openDB(){if(dbPromise)return dbPromise;dbPromise=new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains(PHOTO_STORE))db.createObjectStore(PHOTO_STORE,{keyPath:'id'});};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});return dbPromise;}
async function dbPutPhoto(id,blob,meta={}){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readwrite');tx.objectStore(PHOTO_STORE).put({id,blob,meta,createdAt:Date.now()});tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function dbGetPhoto(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readonly');const r=tx.objectStore(PHOTO_STORE).get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}
async function dbDeletePhoto(id){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readwrite');tx.objectStore(PHOTO_STORE).delete(id);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);});}
async function dbAllPhotos(){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(PHOTO_STORE,'readonly');const r=tx.objectStore(PHOTO_STORE).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}

// State
function newProjectId(){return 'p_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);}
function emptyProject(name=''){return{id:newProjectId(),name:name||'Neues Projekt',createdAt:Date.now(),config:{project:name||'',an:'Hofmann Haus',bauleiter:'',houses:[{id:1,name:'Haus 1',apartments:[{id:1,name:'Wohnung 1'}]}]},items:{},activity:[],schedule:{tasks:[]}};}
function defaultState(){return{projects:[],currentProjectId:null};}
let state=defaultState();
function migrateLegacy(parsed){if(parsed&&parsed.config&&!parsed.projects){const proj={id:newProjectId(),name:parsed.config.project||'Projekt',createdAt:Date.now(),config:parsed.config,items:parsed.items||{},activity:parsed.activity||[],schedule:{tasks:[]}};return{projects:[proj],currentProjectId:proj.id};}return parsed;}
function loadState(){try{let raw=localStorage.getItem(STATE_KEY);if(!raw){const old=localStorage.getItem(STATE_KEY_OLD);if(old){const p=migrateLegacy(JSON.parse(old));state=Object.assign(defaultState(),p);saveState();return;}return;}let parsed=JSON.parse(raw);parsed=migrateLegacy(parsed);state=Object.assign(defaultState(),parsed);state.projects=state.projects||[];state.projects.forEach(p=>{p.items=p.items||{};p.activity=p.activity||[];p.schedule=p.schedule||{tasks:[]};p.schedule.tasks=p.schedule.tasks||[];});}catch(e){console.error('loadState',e);}}
function saveState(){try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(e){toast('Speicher voll!');}}
function currentProject(){return state.projects.find(p=>p.id===state.currentProjectId)||null;}
function getItem(key){const p=currentProject();if(!p)return{done:false,date:'',notes:'',photos:[]};if(!p.items[key])p.items[key]={done:false,date:'',notes:'',photos:[]};return p.items[key];}
function pushActivity(entry){const p=currentProject();if(!p)return;p.activity.unshift({ts:Date.now(),...entry});if(p.activity.length>50)p.activity.length=50;}

// Helpers
function $(sel,root=document){return root.querySelector(sel);}
function escHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(msg){let el=$('.toast');if(!el){el=document.createElement('div');el.className='toast';document.body.appendChild(el);}el.textContent=msg;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),2200);}
function timeAgo(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return'gerade eben';const m=Math.floor(s/60);if(m<60)return`vor ${m} Min`;const h=Math.floor(m/60);if(h<24)return`vor ${h} Std`;const d=Math.floor(h/24);if(d<7)return`vor ${d} Tag${d>1?'en':''}`;return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function buildScopeInstances(scope){const p=currentProject();if(!p)return[];if(scope==='project')return[{key:'project',label:'Projekt',short:'Projekt'}];const out=[];p.config.houses.forEach(h=>{if(scope==='house')out.push({key:`h:${h.id}`,label:`Haus ${h.id}`,short:`H${h.id}`,houseId:h.id});else if(scope==='apartment')h.apartments.forEach(a=>out.push({key:`h:${h.id}:a:${a.id}`,label:`Haus ${h.id} · Wohnung ${a.id}`,short:`W${a.id}`,houseId:h.id,apartmentId:a.id}));});return out;}
function itemKey(c,s,i,k){return`${c}|${s}|${i}|${k}`;}
function findChecklist(id){return CHECKLISTS.find(c=>c.id===id);}
function progressForChecklist(cl){const p=currentProject();if(!p)return{done:0,total:0,photos:0,pct:0};const inst=buildScopeInstances(cl.scope);let d=0,t=0,ph=0;cl.sections.forEach((sec,si)=>sec.items.forEach((_,ii)=>inst.forEach(x=>{t++;const it=p.items[itemKey(cl.id,si,ii,x.key)];if(it){if(it.done)d++;ph+=(it.photos||[]).length;}})));return{done:d,total:t,photos:ph,pct:t?Math.round(d/t*100):0};}
function progressOverall(){let d=0,t=0,ph=0;CHECKLISTS.forEach(cl=>{const p=progressForChecklist(cl);d+=p.done;t+=p.total;ph+=p.photos;});return{done:d,total:t,photos:ph,pct:t?Math.round(d/t*100):0};}
function progressByScope(scope){let d=0,t=0;CHECKLISTS.filter(c=>c.scope===scope).forEach(cl=>{const p=progressForChecklist(cl);d+=p.done;t+=p.total;});return{done:d,total:t,pct:t?Math.round(d/t*100):0,count:CHECKLISTS.filter(c=>c.scope===scope).length};}
async function compressImage(file,maxDim=1600,q=.78){return new Promise((res,rej)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{let{width,height}=img;const r=Math.min(1,maxDim/Math.max(width,height));width=Math.round(width*r);height=Math.round(height*r);const c=document.createElement('canvas');c.width=width;c.height=height;c.getContext('2d').drawImage(img,0,0,width,height);c.toBlob(b=>{URL.revokeObjectURL(url);b?res(b):rej(new Error('compress'));},'image/jpeg',q);};img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error('load'));};img.src=url;});}

// Gantt date helpers
const DAY_MS=86400000;
function parseDate(s){return new Date(s+'T00:00:00');}
function fmtDate(d){if(typeof d==='string')return d;return d.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((parseDate(b)-parseDate(a))/DAY_MS);}
function addDays(s,n){const d=parseDate(s);d.setDate(d.getDate()+n);return fmtDate(d);}
function ganttRange(){const p=currentProject();const tasks=p?.schedule?.tasks||[];if(!tasks.length){const t=new Date();return{start:fmtDate(new Date(t.getFullYear(),t.getMonth(),1)),end:fmtDate(new Date(t.getFullYear(),t.getMonth()+6,0))};}let min=tasks[0].start,max=tasks[0].end;tasks.forEach(t=>{if(t.start<min)min=t.start;if(t.end>max)max=t.end;});return{start:addDays(min,-7),end:addDays(max,7)};}
function dayWidth(){return view.ganttZoom==='day'?28:view.ganttZoom==='week'?12:4;}
function isParent(taskId){const p=currentProject();return p.schedule.tasks.some(t=>t.parent===taskId);}
function isHidden(task,tasks){let pid=task.parent;while(pid){if(ganttCollapsed[pid])return true;const par=tasks.find(t=>t.id===pid);pid=par?.parent;}return false;}

function ensureSetupDraft(fromProject=null){if(setupDraft)return;if(fromProject){setupDraft=JSON.parse(JSON.stringify(fromProject.config));setupDraft._editingId=fromProject.id;}else{setupDraft={project:'',an:'Hofmann Haus',bauleiter:'',houses:[{id:1,name:'Haus 1',apartments:[{id:1,name:'Wohnung 1'}]}]};}}
function setupHousesCount(n){ensureSetupDraft();const c=setupDraft.houses.length;if(n>c)for(let i=c+1;i<=n;i++)setupDraft.houses.push({id:i,name:`Haus ${i}`,apartments:[{id:1,name:'Wohnung 1'}]});else if(n<c)setupDraft.houses.length=n;}
function setupAptsCount(idx,n){ensureSetupDraft();const h=setupDraft.houses[idx];const c=h.apartments.length;if(n>c)for(let i=c+1;i<=n;i++)h.apartments.push({id:i,name:`Wohnung ${i}`});else if(n<c)h.apartments.length=n;}
function readSetupInputs(){if(!setupDraft)return;document.querySelectorAll('[data-setup]').forEach(el=>setupDraft[el.dataset.setup]=el.value);}
function saveSheetFields(){if(!view.sheet)return;const k=itemKey(view.sheet.checklistId,view.sheet.sectionIdx,view.sheet.itemIdx,view.sheet.scopeKey);const it=getItem(k);const date=$('[data-sh="date"]')?.value;const notes=$('[data-sh="notes"]')?.value;if(date!==undefined)it.date=date;if(notes!==undefined)it.notes=notes;saveState();}

function renderPill(cid,sIdx,iIdx,inst){
  const k=itemKey(cid,sIdx,iIdx,inst.key);
  const p=currentProject();
  const it=p.items[k];
  let cls='';
  if(it&&it.done)cls='done';
  else if(it&&(it.photos.length>0||it.notes))cls='partial';
  if(inst.key==='project')cls+=' project';
  const photos=it?it.photos.length:0;
  return `<button class="pill ${cls}" type="button" data-action="open-sheet" data-checklist="${cid}" data-section="${sIdx}" data-item="${iIdx}" data-scope="${escHtml(inst.key)}"><span class="pill-dot"></span><span>${escHtml(inst.short)}</span>${photos>0?`<span class="pill-cam">${ICON.cam}${photos}</span>`:''}</button>`;
}

function renderItemCard(cl,sIdx,iIdx,itemText){
  const p=currentProject();
  const instances=buildScopeInstances(cl.scope);
  let visible=instances;
  if((cl.scope==='house'||cl.scope==='apartment')&&view.detailHouseFilter!=='all'){
    visible=instances.filter(i=>String(i.houseId)===String(view.detailHouseFilter));
  }
  let doneC=0,photoC=0;
  visible.forEach(inst=>{const it=p.items[itemKey(cl.id,sIdx,iIdx,inst.key)];if(it){if(it.done)doneC++;photoC+=(it.photos||[]).length;}});
  const total=visible.length;
  let cls='pending';
  if(doneC===total&&total>0)cls='done';
  else if(doneC>0)cls='partial';
  let pillsHtml='';
  if(cl.scope==='apartment'&&p.config.houses.length>1&&view.detailHouseFilter==='all'){
    const groups={};
    visible.forEach(inst=>{(groups[inst.houseId]=groups[inst.houseId]||[]).push(inst);});
    pillsHtml=Object.keys(groups).map(hk=>`<div class="item-house-group"><div class="item-house-label">Haus ${hk}</div><div class="pills-grid">${groups[hk].map(inst=>renderPill(cl.id,sIdx,iIdx,inst)).join('')}</div></div>`).join('');
  }else{
    pillsHtml=`<div class="pills-grid">${visible.map(inst=>renderPill(cl.id,sIdx,iIdx,inst)).join('')}</div>`;
  }
  return `<div class="item-card">
    <div class="item-card-text">${escHtml(itemText)}</div>
    <div class="item-card-status-row"><div class="status-summary ${cls}"><span class="dot"></span><span>${doneC}/${total} erledigt</span></div>${photoC>0?`<div class="status-summary-meta">${photoC} Fotos</div>`:''}</div>
    ${pillsHtml}
  </div>`;
}

// === GANTT RENDER ===
function renderGantt(){
  const p=currentProject();
  const tasks=p.schedule?.tasks||[];
  if(!tasks.length){
    return `<div class="gantt-empty">
      <div class="empty-emoji">📅</div>
      <h3 style="font-family:var(--display);font-weight:700;font-size:18px;margin:0 0 6px;">Noch kein Bauzeitenplan</h3>
      <p style="color:var(--muted);font-size:14px;margin:0 0 16px;">Lege Termine an oder lade die Gaisbach-13-Vorlage als Startpunkt.</p>
      <div class="gantt-empty-actions">
        <button class="btn btn-ghost" data-action="task-new" type="button">${ICON.plus} Termin anlegen</button>
        <button class="btn btn-primary" data-action="load-gaisbach" type="button">${ICON.calendar} Gaisbach 13 laden</button>
      </div>
    </div>`;
  }
  const range=ganttRange();
  const totalDays=daysBetween(range.start,range.end)+1;
  const dw=dayWidth();
  const tlW=totalDays*dw;
  const today=fmtDate(new Date());
  const todayPos=daysBetween(range.start,today)*dw;
  const todayInRange=today>=range.start&&today<=range.end;
  const visibleTasks=tasks.filter(t=>!isHidden(t,tasks));
  const rowH=32;
  const totalH=visibleTasks.length*rowH;

  // Axis
  const startD=parseDate(range.start);
  const months=[];
  let curM=null;
  for(let i=0;i<=totalDays;i++){
    const d=new Date(startD);d.setDate(d.getDate()+i);
    const k=d.getFullYear()+'-'+d.getMonth();
    if(k!==curM){months.push({start:i,label:d.toLocaleDateString('de-DE',{month:'short',year:'2-digit'})});curM=k;}
  }
  let axisHtml='';
  for(let mi=0;mi<months.length;mi++){
    const next=mi+1<months.length?months[mi+1].start:totalDays;
    const w=(next-months[mi].start)*dw;
    axisHtml+=`<div class="gantt-axis-month" style="left:${months[mi].start*dw}px;width:${w}px;">${escHtml(months[mi].label)}</div>`;
  }
  if(view.ganttZoom==='day'){
    for(let i=0;i<totalDays;i++){
      const d=new Date(startD);d.setDate(d.getDate()+i);
      const isToday=fmtDate(d)===today;
      axisHtml+=`<div class="gantt-axis-day ${isToday?'today':''}" style="left:${i*dw}px;width:${dw}px;">${d.getDate()}</div>`;
    }
  }else if(view.ganttZoom==='week'){
    let i=0;
    while(i<totalDays){
      const d=new Date(startD);d.setDate(d.getDate()+i);
      const dow=(d.getDay()+6)%7;
      const w=Math.min(7-dow,totalDays-i);
      const tmp=new Date(d);tmp.setHours(0,0,0,0);
      tmp.setDate(tmp.getDate()+3-((tmp.getDay()+6)%7));
      const week1=new Date(tmp.getFullYear(),0,4);
      const wn=1+Math.round(((tmp-week1)/86400000-3+((week1.getDay()+6)%7))/7);
      const dEnd=new Date(d);dEnd.setDate(dEnd.getDate()+w-1);
      const todayInWeek=today>=fmtDate(d)&&today<=fmtDate(dEnd);
      axisHtml+=`<div class="gantt-axis-week ${todayInWeek?'today':''}" style="left:${i*dw}px;width:${w*dw}px;">KW${wn}</div>`;
      i+=w;
    }
  }else{
    for(let mi=0;mi<months.length;mi++){
      const next=mi+1<months.length?months[mi+1].start:totalDays;
      axisHtml+=`<div class="gantt-axis-week" style="left:${months[mi].start*dw}px;width:${(next-months[mi].start)*dw}px;">${escHtml(months[mi].label)}</div>`;
    }
  }

  // Grid (weekends + month dividers)
  let gridHtml='';
  for(let i=0;i<=totalDays;i++){
    const d=new Date(startD);d.setDate(d.getDate()+i);
    const dow=d.getDay();
    if(dow===0||dow===6){gridHtml+=`<div class="gantt-grid-weekend" style="left:${i*dw}px;width:${dw}px;"></div>`;}
    if(d.getDate()===1){gridHtml+=`<div class="gantt-grid-line month" style="left:${i*dw}px;"></div>`;}
    else if(view.ganttZoom!=='month'&&dow===1){gridHtml+=`<div class="gantt-grid-line" style="left:${i*dw}px;"></div>`;}
  }

  // Bars
  const rowsHtml=visibleTasks.map(t=>{
    const startDays=daysBetween(range.start,t.start);
    const days=daysBetween(t.start,t.end)+1;
    const left=startDays*dw;
    const width=Math.max(days*dw,6);
    const isP=isParent(t.id);
    const labelOutside=width<60&&!isP;
    return `<div class="gantt-row depth-${t.depth}" style="height:${rowH}px;">
      <div class="gantt-bar ${isP?'summary':''}" data-action="task-edit" data-id="${t.id}" style="left:${left}px;width:${width}px;${!isP?`background:${t.color};`:''}" title="${escHtml(t.num+' '+t.name+': '+t.start+' → '+t.end)}">${!labelOutside&&!isP?`<span style="position:relative;z-index:2;">${escHtml(t.name)}</span>`:''}</div>
      ${labelOutside&&!isP?`<div class="gantt-bar-label-outside" style="left:${left+width+6}px;">${escHtml(t.name)}</div>`:''}
    </div>`;
  }).join('');

  // Dependencies
  let depsSvg='';
  visibleTasks.forEach((t,ti)=>{
    if(!t.predecessors||!t.predecessors.length)return;
    t.predecessors.forEach(predId=>{
      const predIdx=visibleTasks.findIndex(x=>x.id===predId);
      if(predIdx===-1)return;
      const pred=visibleTasks[predIdx];
      const x1=(daysBetween(range.start,pred.end)+1)*dw;
      const y1=predIdx*rowH+rowH/2;
      const x2=daysBetween(range.start,t.start)*dw;
      const y2=ti*rowH+rowH/2;
      const mx=x1+8;
      depsSvg+=`<path d="M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2-4},${y2}" />`;
      depsSvg+=`<polygon points="${x2},${y2} ${x2-5},${y2-3} ${x2-5},${y2+3}" fill="var(--ink-2)" opacity=".5" />`;
    });
  });

  // Task list (left)
  const listHtml=visibleTasks.map(t=>{
    const has=isParent(t.id);
    const isCol=ganttCollapsed[t.id];
    return `<div class="gantt-row-list depth-${t.depth}" style="height:${rowH}px;padding-left:${8+t.depth*14}px;" data-action="task-row-list" data-id="${t.id}">
      <div class="gantt-list-toggle ${has?'':'empty'} ${has&&!isCol?'expanded':''}" data-action="toggle-collapse" data-id="${t.id}">${has?ICON.chevR:''}</div>
      <div class="gantt-list-num">${escHtml(t.num)}</div>
      <div class="gantt-list-name">${escHtml(t.name)}</div>
    </div>`;
  }).join('');

  return `<div class="gantt-page">
    <div class="gantt-toolbar">
      <div class="gantt-toolbar-group">
        <button class="gantt-zoom-btn ${view.ganttZoom==='day'?'active':''}" data-action="gantt-zoom" data-zoom="day" type="button">Tag</button>
        <button class="gantt-zoom-btn ${view.ganttZoom==='week'?'active':''}" data-action="gantt-zoom" data-zoom="week" type="button">Woche</button>
        <button class="gantt-zoom-btn ${view.ganttZoom==='month'?'active':''}" data-action="gantt-zoom" data-zoom="month" type="button">Monat</button>
      </div>
      <button class="btn btn-ghost btn-sm" data-action="gantt-today" type="button">${ICON.calendar} Heute</button>
      <button class="btn btn-ghost btn-sm" data-action="gantt-collapse-all" type="button">Einklappen</button>
      <button class="btn btn-ghost btn-sm" data-action="gantt-expand-all" type="button">Ausklappen</button>
      <div class="gantt-toolbar-spacer"></div>
      <div class="gantt-info"><b>${tasks.length}</b> Termine</div>
      <button class="btn btn-primary btn-sm" data-action="task-new" type="button">${ICON.plus} Neu</button>
    </div>
    <div class="gantt-wrap" id="gantt-wrap">
      <div class="gantt-list" id="gantt-list">
        <div class="gantt-list-head">Vorgang</div>
        ${listHtml}
      </div>
      <div class="gantt-timeline-wrap" id="gantt-timeline-wrap">
        <div class="gantt-timeline" style="width:${tlW}px;height:${totalH+60}px;">
          <div class="gantt-axis" style="width:${tlW}px;">${axisHtml}</div>
          <div class="gantt-grid" style="width:${tlW}px;height:${totalH}px;">${gridHtml}</div>
          ${todayInRange?`<div class="gantt-today-line" style="left:${todayPos}px;height:${totalH+30}px;"><div class="gantt-today-label">Heute</div></div>`:''}
          <div class="gantt-rows" style="position:absolute;top:60px;left:0;width:${tlW}px;height:${totalH}px;">${rowsHtml}</div>
          ${depsSvg?`<svg class="gantt-deps-svg" width="${tlW}" height="${totalH}">${depsSvg}</svg>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// === MAIN RENDER ===
function render(){
  const root=$('#app');
  if(view.screen==='picker'){root.innerHTML=renderPicker();return;}
  if(view.screen==='setup'){root.innerHTML=renderSetup();return;}
  const p=currentProject();
  if(!p){view.screen='picker';render();return;}
  let body='';
  if(view.detail)body=renderDetail();
  else if(view.tab==='dashboard')body=renderDashboard();
  else if(view.tab==='lists')body=renderLists();
  else if(view.tab==='gantt')body=renderGantt();
  else if(view.tab==='activity')body=renderActivity();
  root.innerHTML=`${renderTopbar()}<main>${body}</main>${!view.detail?renderTabbar():''}<div id="sheet-mount">${view.sheet?renderSheet():''}${view.taskEditor?renderTaskEditor():''}</div><div class="viewer" id="viewer"><button class="viewer-close" data-action="close-viewer" type="button">${ICON.x}</button><img alt=""></div><div class="dialog" id="dialog"></div>`;
  if(view.sheet)loadSheetPhotos();
  if(view.tab==='gantt'&&!view.detail&&!view.taskEditor){
    requestAnimationFrame(()=>{
      const wrap=$('#gantt-timeline-wrap');
      if(wrap&&!wrap._scrolled){
        const today=fmtDate(new Date());
        const range=ganttRange();
        if(today>=range.start&&today<=range.end){
          const pos=daysBetween(range.start,today)*dayWidth();
          wrap.scrollLeft=Math.max(0,pos-200);
        }
        wrap._scrolled=true;
      }
      const list=$('#gantt-list'),tl=$('#gantt-timeline-wrap');
      if(list&&tl&&!list._sync){
        let lock=false;
        list.addEventListener('scroll',()=>{if(lock)return;lock=true;tl.scrollTop=list.scrollTop;lock=false;});
        tl.addEventListener('scroll',()=>{if(lock)return;lock=true;list.scrollTop=tl.scrollTop;lock=false;});
        list._sync=true;
      }
    });
  }
}

// === CONFIRM DIALOG ===
function confirmDialog(opts,onConfirm){
  const d=$('#dialog');
  if(!d)return;
  d.innerHTML=`<div class="dialog-panel"><h3 class="dialog-title">${escHtml(opts.title)}</h3><p class="dialog-text">${escHtml(opts.text)}</p><div class="dialog-actions"><button class="btn btn-ghost" data-dlg="cancel" type="button">${escHtml(opts.cancel||'Abbrechen')}</button><button class="btn ${opts.danger?'btn-danger':'btn-primary'}" data-dlg="ok" type="button">${escHtml(opts.ok||'OK')}</button></div></div>`;
  d.classList.add('open');
  d.onclick=(e)=>{if(e.target.dataset.dlg==='cancel'||e.target===d){d.classList.remove('open');}else if(e.target.dataset.dlg==='ok'){d.classList.remove('open');onConfirm();}};
}

// === EVENT DELEGATION ===
document.addEventListener('click',async(e)=>{
  // close menu on outside
  if(view.menuOpen&&!e.target.closest('[data-menu]')&&!e.target.closest('[data-action="menu-toggle"]')){
    view.menuOpen=false;render();return;
  }
  const target=e.target.closest('[data-action]');
  if(!target){
    const tile=e.target.closest('.photo-tile');
    if(tile&&!e.target.closest('[data-action="del-photo"]')){
      const pid=tile.dataset.photoId;
      if(pid){try{const rec=await dbGetPhoto(pid);if(rec&&rec.blob){const v=$('#viewer');v.querySelector('img').src=URL.createObjectURL(rec.blob);v.classList.add('open');}}catch(err){}}
    }
    return;
  }
  const a=target.dataset.action;

  switch(a){
    case 'menu-toggle': e.stopPropagation();view.menuOpen=!view.menuOpen;render();break;
    case 'tab': view.tab=target.dataset.tab;view.detail=null;view.menuOpen=false;render();break;
    case 'open-checklist': view.detail=target.dataset.id;view.detailHouseFilter='all';window.scrollTo(0,0);render();break;
    case 'back-to-lists': view.detail=null;window.scrollTo(0,0);render();break;
    case 'list-filter': listFilter=target.dataset.filter;render();break;
    case 'filter-scope': listFilter=target.dataset.scope;view.tab='lists';render();break;
    case 'house-filter': view.detailHouseFilter=target.dataset.house;render();break;
    case 'open-sheet':
      view.sheet={checklistId:target.dataset.checklist,sectionIdx:parseInt(target.dataset.section,10),itemIdx:parseInt(target.dataset.item,10),scopeKey:target.dataset.scope};
      render();break;
    case 'close-sheet': saveSheetFields();view.sheet=null;render();break;
    case 'toggle-done':{
      if(!view.sheet)break;
      const k=itemKey(view.sheet.checklistId,view.sheet.sectionIdx,view.sheet.itemIdx,view.sheet.scopeKey);
      const it=getItem(k);
      saveSheetFields();
      it.done=!it.done;
      if(it.done&&!it.date)it.date=new Date().toISOString().slice(0,10);
      const cl=findChecklist(view.sheet.checklistId);
      const inst=buildScopeInstances(cl.scope).find(i=>i.key===view.sheet.scopeKey);
      const itemText=cl.sections[view.sheet.sectionIdx].items[view.sheet.itemIdx];
      pushActivity({type:it.done?'check':'uncheck',msg:itemText,parts:[cl.title,inst.label],key:k});
      saveState();render();
      break;
    }
    case 'add-photos':
      if(!view.sheet)break;
      saveSheetFields();
      window._photoTarget={...view.sheet};
      $('#photo-input').click();
      break;
    case 'del-photo':{
      if(!view.sheet)break;
      const pid=target.dataset.photoId;
      const k=itemKey(view.sheet.checklistId,view.sheet.sectionIdx,view.sheet.itemIdx,view.sheet.scopeKey);
      const it=getItem(k);
      it.photos=it.photos.filter(p=>p!==pid);
      try{await dbDeletePhoto(pid);}catch(err){}
      saveState();render();break;
    }
    case 'close-viewer': $('#viewer').classList.remove('open');break;
    case 'open-edit':
      view.menuOpen=false;view.screen='setup';setupDraft=null;ensureSetupDraft(currentProject());render();break;
    case 'export': view.menuOpen=false;await exportBackup();break;
    case 'import': view.menuOpen=false;importBackup();break;
    case 'delete-project':
      view.menuOpen=false;
      confirmDialog({title:'Projekt löschen?',text:'Alle Daten und Fotos zu diesem Projekt gehen verloren. Vorher Backup machen!',ok:'Löschen',cancel:'Abbrechen',danger:true},async()=>{
        const cur=currentProject();
        if(cur){
          try{const ph=await dbAllPhotos();for(const p of ph){if(p.meta?.projectId===cur.id)await dbDeletePhoto(p.id);}}catch(err){}
          state.projects=state.projects.filter(p=>p.id!==cur.id);
          state.currentProjectId=state.projects[0]?.id||null;
          saveState();view.screen='picker';view.detail=null;view.sheet=null;render();toast('Projekt gelöscht');
        }
      });
      break;
    case 'back-to-picker': view.menuOpen=false;view.screen='picker';view.detail=null;view.sheet=null;render();break;
    case 'open-project':
      state.currentProjectId=target.dataset.id;saveState();view.screen='app';view.tab='dashboard';render();break;
    case 'new-project': view.setupMode='new';setupDraft=null;view.screen='setup';render();break;
    case 'new-project-sample':
      view.setupMode='sample';
      setupDraft={project:'Gaisbach 13',an:'Hofmann Haus',bauleiter:'',houses:[{id:1,name:'Haus A',apartments:Array.from({length:8},(_,i)=>({id:i+1,name:`Wohnung ${i+1}`}))},{id:2,name:'Haus B',apartments:Array.from({length:8},(_,i)=>({id:i+1,name:`Wohnung ${i+1}`}))}]};
      view.screen='setup';render();break;
    case 'set-mode':
      view.setupMode=target.dataset.mode;
      if(view.setupMode==='sample'){
        setupDraft={project:'Gaisbach 13',an:'Hofmann Haus',bauleiter:'',houses:[{id:1,name:'Haus A',apartments:Array.from({length:8},(_,i)=>({id:i+1,name:`Wohnung ${i+1}`}))},{id:2,name:'Haus B',apartments:Array.from({length:8},(_,i)=>({id:i+1,name:`Wohnung ${i+1}`}))}]};
      }else{setupDraft=null;}
      render();break;
    case 'activity-jump':{
      const k=target.dataset.key;
      if(!k)break;
      const parts=k.split('|');
      const cid=parts[0],s=parts[1],i=parts[2],sk=parts.slice(3).join('|');
      view.tab='lists';view.detail=cid;
      view.sheet={checklistId:cid,sectionIdx:parseInt(s,10),itemIdx:parseInt(i,10),scopeKey:sk};
      render();break;
    }
    case 'houses-inc': ensureSetupDraft();setupHousesCount(setupDraft.houses.length+1);render();break;
    case 'houses-dec': ensureSetupDraft();if(setupDraft.houses.length>1){setupHousesCount(setupDraft.houses.length-1);render();}break;
    case 'apt-inc':{ensureSetupDraft();const idx=parseInt(target.dataset.houseIdx,10);setupAptsCount(idx,setupDraft.houses[idx].apartments.length+1);render();break;}
    case 'apt-dec':{ensureSetupDraft();const idx=parseInt(target.dataset.houseIdx,10);if(setupDraft.houses[idx].apartments.length>1){setupAptsCount(idx,setupDraft.houses[idx].apartments.length-1);render();}break;}
    case 'setup-save':{
      ensureSetupDraft();readSetupInputs();
      if(!setupDraft.project.trim()){toast('Bitte Bauvorhaben angeben');$('#f-project')?.focus();return;}
      const editingId=setupDraft._editingId;
      delete setupDraft._editingId;
      if(editingId){
        const proj=state.projects.find(p=>p.id===editingId);
        if(proj){proj.config=JSON.parse(JSON.stringify(setupDraft));proj.name=setupDraft.project;}
        toast('Projekt gespeichert');
      }else{
        const proj=emptyProject(setupDraft.project);
        proj.config=JSON.parse(JSON.stringify(setupDraft));
        if(view.setupMode==='sample'){proj.schedule.tasks=JSON.parse(JSON.stringify(SAMPLE_GAISBACH.tasks));}
        state.projects.push(proj);
        state.currentProjectId=proj.id;
        toast('Projekt erstellt');
      }
      saveState();setupDraft=null;view.screen='app';view.tab='dashboard';render();break;
    }
    case 'setup-cancel':
      setupDraft=null;
      view.screen=state.projects.length>0?(state.currentProjectId?'app':'picker'):'picker';
      render();break;

    // Gantt
    case 'gantt-zoom':
      view.ganttZoom=target.dataset.zoom;
      const wrap=$('#gantt-timeline-wrap');if(wrap)wrap._scrolled=false;
      render();break;
    case 'gantt-today':{
      const w=$('#gantt-timeline-wrap');
      if(w){const today=fmtDate(new Date());const range=ganttRange();const pos=daysBetween(range.start,today)*dayWidth();w.scrollLeft=Math.max(0,pos-200);}
      break;
    }
    case 'gantt-collapse-all':{const p=currentProject();p.schedule.tasks.forEach(t=>{if(isParent(t.id))ganttCollapsed[t.id]=true;});render();break;}
    case 'gantt-expand-all': ganttCollapsed={};render();break;
    case 'toggle-collapse':{e.stopPropagation();const id=target.dataset.id;ganttCollapsed[id]=!ganttCollapsed[id];render();break;}
    case 'task-row-list':case 'task-edit':{
      const p=currentProject();const t=p.schedule.tasks.find(x=>x.id===target.dataset.id);
      if(t){view.taskEditor={task:JSON.parse(JSON.stringify(t)),isNew:false};render();}break;
    }
    case 'task-new':{
      const today=fmtDate(new Date());
      view.taskEditor={task:{id:'t_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,5),num:'',name:'',start:today,end:today,parent:null,color:TASK_COLORS[1],depth:0,predecessors:[]},isNew:true};
      render();break;
    }
    case 'load-gaisbach':{const p=currentProject();p.schedule.tasks=JSON.parse(JSON.stringify(SAMPLE_GAISBACH.tasks));saveState();render();toast('Gaisbach 13 geladen — 150 Termine');break;}
    case 'close-task-editor': readTaskEditor();view.taskEditor=null;render();break;
    case 'te-color': readTaskEditor();view.taskEditor.task.color=target.dataset.color;render();break;
    case 'te-dep-remove':{readTaskEditor();const id=target.dataset.id;view.taskEditor.task.predecessors=(view.taskEditor.task.predecessors||[]).filter(x=>x!==id);render();break;}
    case 'te-save':{
      readTaskEditor();
      const t=view.taskEditor.task;
      if(!t.name.trim()){toast('Name fehlt');return;}
      if(!t.start||!t.end){toast('Datum fehlt');return;}
      if(t.start>t.end){toast('Ende vor Start');return;}
      const p=currentProject();
      if(t.parent){const par=p.schedule.tasks.find(x=>x.id===t.parent);t.depth=par?(par.depth+1):0;}else{t.depth=0;}
      if(view.taskEditor.isNew){p.schedule.tasks.push(t);}
      else{const idx=p.schedule.tasks.findIndex(x=>x.id===t.id);if(idx>=0)p.schedule.tasks[idx]=t;}
      saveState();view.taskEditor=null;render();toast('Termin gespeichert');break;
    }
    case 'te-delete':
      confirmDialog({title:'Termin löschen?',text:'Auch alle Unterpunkte werden mitgelöscht.',ok:'Löschen',cancel:'Abbrechen',danger:true},()=>{
        const p=currentProject();
        const id=view.taskEditor.task.id;
        const toDel=new Set([id]);
        let changed=true;
        while(changed){changed=false;p.schedule.tasks.forEach(t=>{if(t.parent&&toDel.has(t.parent)&&!toDel.has(t.id)){toDel.add(t.id);changed=true;}});}
        p.schedule.tasks=p.schedule.tasks.filter(t=>!toDel.has(t.id));
        saveState();view.taskEditor=null;render();toast('Termin gelöscht');
      });
      break;
  }
});

// === DEPENDENCY-ADD select handler (uses change event) ===
document.addEventListener('change',(e)=>{
  if(e.target.dataset.action==='te-dep-add'){
    readTaskEditor();
    const id=e.target.value;
    if(id){
      view.taskEditor.task.predecessors=view.taskEditor.task.predecessors||[];
      if(!view.taskEditor.task.predecessors.includes(id))view.taskEditor.task.predecessors.push(id);
      render();
    }
  }
});

// Live setup input updates (so re-renders preserve values)
document.addEventListener('input',(e)=>{
  if(e.target.dataset.setup){if(setupDraft)setupDraft[e.target.dataset.setup]=e.target.value;}
});

// === PHOTO INPUT HANDLER ===
$('#photo-input').addEventListener('change',async(e)=>{
  const files=Array.from(e.target.files||[]);
  if(!files.length||!window._photoTarget){e.target.value='';return;}
  const target=window._photoTarget;
  const k=itemKey(target.checklistId,target.sectionIdx,target.itemIdx,target.scopeKey);
  const it=getItem(k);
  const cl=findChecklist(target.checklistId);
  const inst=buildScopeInstances(cl.scope).find(i=>i.key===target.scopeKey);
  const itemText=cl.sections[target.sectionIdx].items[target.itemIdx];
  toast(`${files.length} Foto${files.length>1?'s':''} werden verarbeitet…`);
  const projId=currentProject()?.id;
  for(const f of files){
    try{
      const blob=await compressImage(f);
      const pid='ph_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7);
      await dbPutPhoto(pid,blob,{projectId:projId,key:k,checklist:cl.title,scope:inst.label,item:itemText});
      it.photos.push(pid);
    }catch(err){console.error(err);toast('Foto-Fehler');}
  }
  pushActivity({type:'photo',msg:itemText,parts:[cl.title,inst.label,`${files.length} Foto${files.length>1?'s':''}`],key:k});
  saveState();e.target.value='';render();toast(`${files.length} Foto${files.length>1?'s':''} gespeichert`);
});

// === EXPORT / IMPORT ===
async function exportBackup(){
  toast('Backup wird erstellt…');
  const cur=currentProject();
  const photos=await dbAllPhotos();
  const photoData={};
  for(const p of photos){
    if(cur&&p.meta?.projectId&&p.meta.projectId!==cur.id)continue;
    const reader=new FileReader();
    const dataUrl=await new Promise((res,rej)=>{reader.onload=()=>res(reader.result);reader.onerror=()=>rej(reader.error);reader.readAsDataURL(p.blob);});
    photoData[p.id]={dataUrl,meta:p.meta||{},createdAt:p.createdAt};
  }
  const payload={version:3,exportedAt:new Date().toISOString(),project:cur,photos:photoData};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const fname=(cur?.config?.project||'projekt').replace(/[^a-z0-9_-]/gi,'_').toLowerCase();
  a.download=`hofmann-backup-${fname}-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Backup heruntergeladen');
}

function importBackup(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='application/json,.json';
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    try{
      const data=JSON.parse(await f.text());
      let proj=null;
      if(data.project)proj=data.project;
      else if(data.state?.config){const m=migrateLegacy(data.state);proj=m.projects[0];}
      else if(data.state?.projects)proj=data.state.projects[0];
      if(!proj||!data.photos)throw new Error('Format');
      confirmDialog({title:'Backup importieren?',text:'Wird als neues Projekt hinzugefügt.',ok:'Importieren',cancel:'Abbrechen'},async()=>{
        proj.id=newProjectId();
        state.projects.push(proj);
        state.currentProjectId=proj.id;
        for(const[pid,info]of Object.entries(data.photos)){
          try{const b=await(await fetch(info.dataUrl)).blob();await dbPutPhoto(pid,b,{...(info.meta||{}),projectId:proj.id});}catch(e){}
        }
        saveState();view.screen='app';view.tab='dashboard';view.detail=null;view.sheet=null;render();toast('Backup importiert');
      });
    }catch(err){toast('Import fehlgeschlagen: '+err.message);}
  };
  inp.click();
}

// === INIT ===
function init(){
  loadState();
  if(state.projects.length===0){view.screen='picker';}
  else if(state.currentProjectId){view.screen='app';}
  else{view.screen='picker';}
  render();
}
init();
})();
